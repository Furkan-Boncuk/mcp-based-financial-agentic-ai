server:
  port: ${FINANCIAL_AGENT_SERVICE_PORT:8083}

spring:
  application:
    name: financial-agent-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mcp_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    schemas: ${AGENT_DB_SCHEMA:financial_agent_service}
    locations: classpath:db/migration
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
