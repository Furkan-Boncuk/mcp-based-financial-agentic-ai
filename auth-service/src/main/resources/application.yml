server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mcp_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    schemas: ${AUTH_DB_SCHEMA:auth_service}
    locations: classpath:db/migration
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

auth:
  refresh-token:
    ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
